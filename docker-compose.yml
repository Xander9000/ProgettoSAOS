version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: elearning_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: elearning_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elearning_net
      
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: elearning_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    expose:
      - "5672"
      - "15672"
    networks:
      - elearning_net

  api-gateway:
    build: ./api-gateway
    container_name: elearning_api_gateway
    ports:
      - "8081:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - COURSE_SERVICE_URL=http://course-service:3003
      - CONTENT_SERVICE_URL=http://content-service:3004
      - QUIZ_SERVICE_URL=http://quiz-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - ALLOWED_ORIGIN=http://localhost:8080
    networks:
      - elearning_net
    depends_on:
      - auth-service
      - user-service
      - course-service
      - content-service
      - notification-service

  auth-service:
    build: ./auth-service
    container_name: elearning_auth_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=auth_service_schema
      - JWT_PRIVATE_KEY_B64=${JWT_PRIVATE_KEY_B64}
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - ALLOWED_WEBAUTHN_ORIGINS=${ALLOWED_WEBAUTHN_ORIGINS:-http://localhost:8080,http://localhost:3000}
      - ALLOWED_RP_IDS=${ALLOWED_RP_IDS:-localhost}
      - DEFAULT_RP_ID=${DEFAULT_RP_ID:-localhost}
      - DEFAULT_HOST=localhost:8080
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SENDMAIL_PATH=${SENDMAIL_PATH:-}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://localhost:8080}
      - TWO_FACTOR_ENCRYPTION_KEY=${TWO_FACTOR_ENCRYPTION_KEY}
    networks:
      - elearning_net
    depends_on:
      - postgres

  user-service:
    build: ./user-service
    container_name: elearning_user_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=user_service_schema
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    networks:
      - elearning_net
    depends_on:
      - postgres
      - auth-service
      - notification-service

  course-service:
    build: ./course-service
    container_name: elearning_course_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=course_service_schema
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    networks:
      - elearning_net
    depends_on:
      - postgres
      - notification-service
      - auth-service

  content-service:
    build: ./content-service
    container_name: elearning_content_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=content_service_schema
      - COURSE_SERVICE_URL=http://course-service:3003
      - AUTH_SERVICE_URL=http://auth-service:3001
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - elearning_net
    depends_on:
      - postgres
      - course-service
      - auth-service

  quiz-service:
    build: ./quiz-service
    container_name: elearning_quiz_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=quiz_service_schema
      - COURSE_SERVICE_URL=http://course-service:3003
      - AUTH_SERVICE_URL=http://auth-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
    networks:
      - elearning_net
    depends_on:
      - postgres
      - course-service
      - auth-service

  audit-service:
    build: ./audit-service
    container_name: elearning_audit_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=audit_service_schema
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    networks:
      - elearning_net
    depends_on:
      - postgres
      - rabbitmq

  notification-service:
    build: ./notification-service
    container_name: elearning_notification_service
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=notification_service_schema
      - AUTH_SERVICE_URL=http://auth-service:3001
      - JWT_PUBLIC_KEY_B64=${JWT_PUBLIC_KEY_B64}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - AUDIT_SERVICE_URL=http://audit-service:3006
    networks:
      - elearning_net
    depends_on:
      - postgres
      - auth-service

  web:
    build: ./web
    container_name: elearning_web
    ports:
      - "8080:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
    networks:
      - elearning_net
    depends_on:
      - api-gateway

networks:
  elearning_net:
    driver: bridge

volumes:
  postgres_data:
